name: Upload to PyPI

# Events that trigger workflow
on:
  # Runs on all pushes to the main branch
  # if 'cace/__version__.py' was touched
  push:
    paths:
    - 'cace/__version__.py'
    branches:
    - main
  # Manual Dispatch
  workflow_dispatch:

jobs:
  build-and-upload:
    # Only run this job if the owner is FOSSi Foundation
    if: github.repository_owner == 'fossi-foundation'
    runs-on: ubuntu-24.04
    name: Build Package 📦 and Upload to PyPI 🐍
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: make dependencies
      - name: Build Package
        run: make build
      - name: Upload
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
